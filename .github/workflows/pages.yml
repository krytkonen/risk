name: Deploy PWA to GitHub Pages

# Julkaisee staattisen PWA:n (www/) GitHub Pagesiin.
# Ota käyttöön kerran: repo → Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Sen jälkeen jokainen push mainiin julkaisee pelin.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Salli vain yksi rinnakkainen julkaisu.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # build:www on puhdas Node-skripti (ei riippuvuuksia) → kokoaa www/-kansion.
      - run: node tools/build-www.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: www

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
